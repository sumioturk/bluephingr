<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to phingr!</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .success-check {
      width: 80px;
      height: 80px;
      background: #dcfce7;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 24px;
    }
    .success-page h1 {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .success-page p {
      color: var(--gray-500);
      font-size: 1.1rem;
      max-width: 480px;
      margin: 0 auto 28px;
    }
  </style>
</head>
<body>
  <div class="success-page">
    <div>
      <div class="success-check">&#10003;</div>
      <h1>You're all set!</h1>
      <p>Your phingr subscription is active. Check your email for setup instructions and your license key.</p>
      <a href="https://github.com/sumioturk/phingr" class="btn btn-primary btn-large">Go to Documentation</a>
    </div>
  </div>
</body>
</html>
