name: Toggle Bluetooth
device: http://phingr-e825.local:8080
---
# 1. Go to home screen
- pressKey: home
- wait: 1

# 2. Find and open Settings
- swipeUntilFound:
    element: "Settings"
    direction: LEFT
    maxSwipes: 10
- tapOn: "Settings"
- wait: 1

# 3. Find and open Bluetooth
- swipeUntilFound:
    element: "Bluetooth"
    direction: UP
    maxSwipes: 10
- tapOn: "Bluetooth"
- wait: 1

# 4. Toggle the Bluetooth switch
- tapOn: "0.85, 0.44"
- wait: 1
